<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Tài sản - Tra cứu dữ liệu mới</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --bg: #f4f7f6; --text: #2c3e50; --white: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 25px; max-width: 1700px; margin: auto; }
        .sidebar { background: var(--white); padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .sidebar h2 { color: var(--primary); font-size: 18px; text-transform: uppercase; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 25px; }
        .filter-group { margin-bottom: 18px; }
        .filter-group label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 8px; color: #64748b; }
        input { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1); }
        .btn-search { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-search:hover { background: #144317; transform: translateY(-2px); }
        .btn-reset { width: 100%; background: none; color: #94a3b8; border: none; margin-top: 15px; cursor: pointer; font-size: 13px; text-decoration: underline; }
        .main-content { display: flex; flex-direction: column; gap: 25px; }
        .kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .kpi-card { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; flex-direction: column; align-items: center; border-left: 5px solid var(--primary); }
        .kpi-card span { font-size: 13px; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .kpi-card b { font-size: 28px; color: var(--primary); margin-top: 5px; }
        .stats-row { display: grid; grid-template-columns: 450px 1fr; gap: 25px; }
        .glass-card { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .glass-card h3 { margin-top: 0; font-size: 16px; color: var(--primary); text-transform: uppercase; border-bottom: 1px solid #f1f5f9; padding-bottom: 12px; margin-bottom: 20px; }
        .summary-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .summary-table th { text-align: left; padding: 12px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        .summary-table td { padding: 12px; border-bottom: 1px solid #f8fafc; }
        .badge-count { background: #e8f5e9; color: var(--primary); padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .table-area { background: var(--white); padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        .table-resizer { overflow-x: auto; max-height: 500px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 2000px; }
        th { background: #f8fafc; color: #64748b; position: sticky; top: 0; padding: 15px; text-align: left; font-size: 12px; border-bottom: 2px solid #eee; z-index: 5; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        tr:hover { background: #fdfdfd; }
        #pieChart { max-height: 300px; width: 100% !important; }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <h2>Bộ lọc tìm kiếm</h2>
        <div id="status" style="font-size: 12px; margin-bottom: 20px; color: #ef6c00;">🔄 Đang tải dữ liệu...</div>
        
        <div class="filter-group">
            <label>Phường / Xã</label>
            <input type="text" id="filterPhuong" placeholder="Địa điểm (phường/ xã)...">
        </div>
        <div class="filter-group">
            <label>Tên đường / Công trình</label>
            <input type="text" id="filterDuong" placeholder="Nhập tên đường/công trình...">
        </div>
        <div class="filter-group">
            <label>Khối lượng / Diện tích</label>
            <input type="text" id="filterKhoiLuong" placeholder="Cây/ha/m2...">
        </div>
        <div class="filter-group">
            <label>Đơn vị quản lý</label>
            <input type="text" id="filterDonVi" placeholder="Cơ quan, tổ chức...">
        </div>
        
        <button id="searchBtn" class="btn-search" onclick="performFilter()" disabled>TRA CỨU DỮ LIỆU</button>
        <button class="btn-reset" onclick="resetFilters()">Đặt lại bộ lọc</button>
    </aside>
    
    <main class="main-content">
        <div class="kpi-row">
            <div class="kpi-card"><span>Tổng số mục</span><b id="kpiTotal">0</b></div>
            <div class="kpi-card"><span>Phân loại diện tích</span><b id="kpiSpecies">0</b></div>
            <div class="kpi-card"><span>Tuyến đường/CT</span><b id="kpiStreets">0</b></div>
        </div>

        <div class="stats-row">
            <div class="glass-card">
                <h3>Tỉ lệ Khối lượng / Diện tích (%)</h3>
                <canvas id="pieChart"></canvas>
            </div>
            <div class="glass-card">
                <h3>Top 10 Phân bố theo Đường/Công trình</h3>
                <table class="summary-table">
                    <thead>
                        <tr>
                            <th>Tên Đường / Công trình</th>
                            <th>Số lượng mục</th>
                            <th>Tỉ trọng</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody">
                        <tr><td colspan="3" style="text-align:center; color:#94a3b8; padding:40px;">Đang xử lý dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <div class="table-area">
            <div class="table-resizer">
                <table id="mainTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const DATA_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTKUfkZtVRIva2X9gwaOKo2ZNMHw2h1BZce-9-MQ4rei0kWY339PCY9WDWK7vjM7uQyRPAyZVPqDUU-/pub?output=csv';
    
    let db = [];
    let headers = [];
    let pieChart;

    // Các biến lưu vị trí cột (Index)
    let idxPhuong = -1, idxDuong = -1, idxKhoiLuong = -1, idxDonVi = -1;

    Chart.register(ChartDataLabels);

    window.onload = function() {
        Papa.parse(DATA_URL, {
            download: true, skipEmptyLines: true,
            complete: function(results) {
                db = results.data;
                headers = db[0];
                
                // Tự động tìm Index của cột dựa trên tên tiêu đề
                idxPhuong = headers.findIndex(h => h.includes("Địa điểm (phường/ xã)"));
                idxDuong = headers.findIndex(h => h.includes("Tên đường/công trình"));
                idxKhoiLuong = headers.findIndex(h => h.includes("Khối lượng/ Diện tích"));
                idxDonVi = headers.findIndex(h => h.includes("Cơ quan, tổ chức, đơn vị đang quản lý"));

                document.getElementById('tableHead').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
                document.getElementById('status').innerHTML = "✅ Dữ liệu mới đã sẵn sàng";
                document.getElementById('searchBtn').disabled = false;
                
                performFilter(); 
            }
        });
    };

    function performFilter() {
        const qPhuong = document.getElementById('filterPhuong').value.toLowerCase().trim();
        const qDuong = document.getElementById('filterDuong').value.toLowerCase().trim();
        const qKL = document.getElementById('filterKhoiLuong').value.toLowerCase().trim();
        const qDonVi = document.getElementById('filterDonVi').value.toLowerCase().trim();

        const filtered = db.slice(1).filter(row => {
            const matchPhuong = idxPhuong === -1 || !qPhuong || (row[idxPhuong] && row[idxPhuong].toLowerCase().includes(qPhuong));
            const matchDuong = idxDuong === -1 || !qDuong || (row[idxDuong] && row[idxDuong].toLowerCase().includes(qDuong));
            const matchKL = idxKhoiLuong === -1 || !qKL || (row[idxKhoiLuong] && row[idxKhoiLuong].toLowerCase().includes(qKL));
            const matchDonVi = idxDonVi === -1 || !qDonVi || (row[idxDonVi] && row[idxDonVi].toLowerCase().includes(qDonVi));
            
            return matchPhuong && matchDuong && matchKL && matchDonVi;
        });

        updateKPIs(filtered);
        updateSummaryTable(filtered);
        updatePieChart(filtered);
        renderTable(filtered);
    }

    function updateKPIs(data) {
        document.getElementById('kpiTotal').innerText = data.length.toLocaleString();
        const klTypes = idxKhoiLuong !== -1 ? new Set(data.map(r => r[idxKhoiLuong])).size : 0;
        const streetCount = idxDuong !== -1 ? new Set(data.map(r => r[idxDuong])).size : 0;
        document.getElementById('kpiSpecies').innerText = klTypes;
        document.getElementById('kpiStreets').innerText = streetCount;
    }

    function updateSummaryTable(data) {
        const counts = {};
        data.forEach(row => {
            const key = (idxDuong !== -1 ? row[idxDuong] : "Không xác định") || "Khác";
            counts[key] = (counts[key] || 0) + 1;
        });

        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 10);
        const tbody = document.getElementById('summaryBody');
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8; padding:40px;">Không có dữ liệu</td></tr>';
            return;
        }

        tbody.innerHTML = sorted.map(([name, count]) => {
            const percent = ((count / data.length) * 100).toFixed(1);
            return `<tr>
                <td><b>${name}</b></td>
                <td><span class="badge-count">${count} mục</span></td>
                <td style="color:#64748b">${percent}%</td>
            </tr>`;
        }).join('');
    }

    function updatePieChart(data) {
        const counts = {};
        data.forEach(row => {
            const val = (idxKhoiLuong !== -1 ? row[idxKhoiLuong] : "Khác") || "Khác";
            counts[val] = (counts[val] || 0) + 1;
        });

        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 6);
        const labels = sorted.map(d => d[0]);
        const values = sorted.map(d => d[1]);

        if (pieChart) pieChart.destroy();
        const ctx = document.getElementById('pieChart').getContext('2d');
        
        if (data.length === 0) return;

        pieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#1b5e20', '#388e3c', '#66bb6a', '#81c784', '#a5d6a7', '#f1f8e9']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                    datalabels: {
                        color: '#fff',
                        font: { weight: 'bold', size: 10 },
                        formatter: (value, ctx) => {
                            let sum = 0;
                            let dataArr = ctx.chart.data.datasets[0].data;
                            dataArr.map(data => { sum += data; });
                            return ((value * 100) / sum).toFixed(1) + "%";
                        }
                    }
                }
            }
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = data.slice(0, 500).map(row => 
            `<tr>${row.map(cell => `<td>${cell || ''}</td>`).join('')}</tr>`
        ).join('');
    }

    function resetFilters() {
        document.querySelectorAll('.sidebar input').forEach(i => i.value = "");
        performFilter();
    }
</script>

</body>
</html>
